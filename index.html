<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Snelheid & G-Kracht Meter</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c10;
    --panel: #0d1318;
    --border: #1a2a35;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --green: #39ff14;
    --warn: #ffcc00;
    --danger: #ff2222;
    --text: #c8dde8;
    --dim: #3a5a6a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
    padding: 12px;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 480px;
    position: relative;
    z-index: 1;
  }

  header {
    text-align: center;
    padding: 16px 0 20px;
  }

  header h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0.8;
  }

  header .tagline {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--dim);
    margin-top: 4px;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
  }

  .status-indicator {
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--dim);
  }
  .dot.active { background: var(--green); box-shadow: 0 0 8px var(--green); animation: blink 1.2s infinite; }
  .dot.warn { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .dot.error { background: var(--danger); box-shadow: 0 0 8px var(--danger); }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Big speed gauge */
  .speed-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 20px;
    margin-bottom: 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .speed-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .speed-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .speed-value {
    font-family: 'Share Tech Mono', monospace;
    font-size: 88px;
    line-height: 1;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(0,229,255,0.4);
    transition: color 0.3s;
  }

  .speed-value.fast { color: var(--warn); text-shadow: 0 0 30px rgba(255,204,0,0.4); }
  .speed-value.vfast { color: var(--danger); text-shadow: 0 0 30px rgba(255,34,34,0.4); }

  .speed-unit {
    font-size: 18px;
    color: var(--dim);
    letter-spacing: 2px;
  }

  /* Arc gauge */
  .arc-wrap {
    margin: 8px auto 0;
    width: 100%;
    max-width: 320px;
  }

  .arc-wrap svg { width: 100%; height: auto; }

  /* G-Force section */
  .gforce-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }

  .gforce-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent2), transparent);
  }

  .card-title {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .g-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }

  .g-item {
    text-align: center;
  }

  .g-axis {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .g-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 28px;
    line-height: 1;
    transition: color 0.2s;
  }

  .g-val.x { color: #ff6b6b; }
  .g-val.y { color: #6bff6b; }
  .g-val.z { color: #6b9fff; }

  .g-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }

  .g-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.15s ease;
  }

  .g-bar-fill.x { background: #ff6b6b; }
  .g-bar-fill.y { background: #6bff6b; }
  .g-bar-fill.z { background: #6b9fff; }

  /* Total G */
  .g-total-row {
    margin-top: 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    background: rgba(255,107,53,0.07);
    border: 1px solid rgba(255,107,53,0.2);
    border-radius: 8px;
  }

  .g-total-label {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--dim);
  }

  .g-total-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 36px;
    color: var(--accent2);
    text-shadow: 0 0 20px rgba(255,107,53,0.4);
  }

  .g-total-unit {
    font-size: 13px;
    color: var(--dim);
  }

  /* Stats row */
  .stats-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }

  .stat-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 22px;
    color: var(--text);
  }

  .stat-unit {
    font-size: 10px;
    color: var(--dim);
    margin-top: 2px;
  }

  /* Button */
  .btn-row {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
  }

  button {
    flex: 1;
    padding: 14px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  button.primary {
    border-color: var(--accent);
    color: var(--accent);
  }

  button.primary:hover, button.primary.active {
    background: var(--accent);
    color: var(--bg);
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
  }

  button.secondary:hover {
    border-color: var(--dim);
  }

  button:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  /* Permission notice */
  .notice {
    background: rgba(255,204,0,0.05);
    border: 1px solid rgba(255,204,0,0.2);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 12px;
    line-height: 1.6;
    color: var(--warn);
    margin-bottom: 12px;
    display: none;
  }

  .notice.show { display: block; }

  /* G-force visual indicator ring */
  .g-ring-wrap {
    display: flex;
    justify-content: center;
    margin: 6px 0 14px;
  }

  footer {
    text-align: center;
    padding: 12px 0 20px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>⚡ MOTION ANALYZER</h1>
    <div class="tagline">GPS · ACCELEROMETER · REALTIME</div>
  </header>

  <div class="status-bar">
    <div class="status-indicator">
      <div class="dot" id="gps-dot"></div>
      <span id="gps-status">GPS: WACHTEN</span>
    </div>
    <div class="status-indicator">
      <div class="dot" id="acc-dot"></div>
      <span id="acc-status">ACCEL: WACHTEN</span>
    </div>
    <div id="accuracy-display" style="font-size:10px; color: var(--dim);">±— m</div>
  </div>

  <div class="notice" id="notice"></div>

  <div class="speed-card">
    <div class="speed-label">SNELHEID</div>
    <div class="speed-value" id="speed-val">0</div>
    <div class="speed-unit">km/u</div>
    <div class="arc-wrap">
      <svg viewBox="0 0 300 80" id="speed-arc-svg">
        <!-- Background arc -->
        <path d="M 20 70 A 130 130 0 0 1 280 70" fill="none" stroke="#1a2a35" stroke-width="8" stroke-linecap="round"/>
        <!-- Speed arc fill -->
        <path d="M 20 70 A 130 130 0 0 1 280 70" fill="none" stroke="url(#arcGrad)" stroke-width="8" stroke-linecap="round"
              stroke-dasharray="408" stroke-dashoffset="408" id="speed-arc"/>
        <!-- Tick marks -->
        <defs>
          <linearGradient id="arcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00e5ff"/>
            <stop offset="60%" stop-color="#ffcc00"/>
            <stop offset="100%" stop-color="#ff2222"/>
          </linearGradient>
        </defs>
      </svg>
    </div>
  </div>

  <div class="gforce-card">
    <div class="card-title">G-KRACHT ANALYSE</div>
    <div class="g-grid">
      <div class="g-item">
        <div class="g-axis">X-AS</div>
        <div class="g-val x" id="gx-val">0.00</div>
        <div style="font-size:10px; color:var(--dim);">g</div>
        <div class="g-bar"><div class="g-bar-fill x" id="gx-bar" style="width:0%"></div></div>
      </div>
      <div class="g-item">
        <div class="g-axis">Y-AS</div>
        <div class="g-val y" id="gy-val">0.00</div>
        <div style="font-size:10px; color:var(--dim);">g</div>
        <div class="g-bar"><div class="g-bar-fill y" id="gy-bar" style="width:0%"></div></div>
      </div>
      <div class="g-item">
        <div class="g-axis">Z-AS</div>
        <div class="g-val z" id="gz-val">0.00</div>
        <div style="font-size:10px; color:var(--dim);">g</div>
        <div class="g-bar"><div class="g-bar-fill z" id="gz-bar" style="width:0%"></div></div>
      </div>
    </div>
    <div class="g-total-row">
      <div>
        <div class="g-total-label">TOTALE G-KRACHT</div>
        <div style="font-size:10px; color:var(--dim); margin-top:3px;" id="g-desc">Rust</div>
      </div>
      <div style="display:flex; align-items:baseline; gap:6px;">
        <div class="g-total-val" id="g-total">1.00</div>
        <div class="g-total-unit">G</div>
      </div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Top snelheid</div>
      <div class="stat-val" id="max-speed">0</div>
      <div class="stat-unit">km/u</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Max G</div>
      <div class="stat-val" id="max-g">0.00</div>
      <div class="stat-unit">G</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hoogte</div>
      <div class="stat-val" id="altitude">—</div>
      <div class="stat-unit">m</div>
    </div>
  </div>

  <div class="btn-row">
    <button class="primary" id="start-btn" onclick="startTracking()">▶ START</button>
    <button class="secondary" id="reset-btn" onclick="resetStats()">↺ RESET</button>
  </div>

  <footer>GEBRUIK OP EIGEN RISICO · NIET VOOR VEILIGHEIDSRITISCH GEBRUIK</footer>
</div>

<script>
let watchId = null;
let maxSpeed = 0;
let maxG = 0;
let isRunning = false;
let accAvailable = false;

const G = 9.80665; // m/s²

// Smoothing buffers
let accelBuffer = { x: [], y: [], z: [] };
const SMOOTH = 5;

function avg(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function updateArc(speedKmh) {
  const maxKmh = 200;
  const pct = Math.min(speedKmh / maxKmh, 1);
  const totalLength = 408;
  const offset = totalLength - (pct * totalLength);
  document.getElementById('speed-arc').setAttribute('stroke-dashoffset', offset);
}

function setSpeedColor(speedKmh) {
  const el = document.getElementById('speed-val');
  el.classList.remove('fast', 'vfast');
  if (speedKmh > 120) el.classList.add('vfast');
  else if (speedKmh > 60) el.classList.add('fast');
}

function describeG(g) {
  if (g < 1.1) return 'Rust / rechte lijn';
  if (g < 1.5) return 'Lichte versnelling';
  if (g < 2.0) return 'Matige G-kracht';
  if (g < 3.0) return 'Hoge G-kracht ⚠️';
  return 'Extreme G-kracht! 🔴';
}

function startTracking() {
  if (isRunning) {
    stopTracking();
    return;
  }

  const btn = document.getElementById('start-btn');
  btn.textContent = '■ STOP';
  btn.classList.add('active');
  isRunning = true;

  // GPS
  if ('geolocation' in navigator) {
    setStatus('gps', 'warn', 'GPS: VERBINDEN...');
    watchId = navigator.geolocation.watchPosition(
      onGPS,
      onGPSError,
      { enableHighAccuracy: true, maximumAge: 500, timeout: 10000 }
    );
  } else {
    setStatus('gps', 'error', 'GPS: NIET BESCHIKBAAR');
  }

  // Accelerometer
  if (typeof DeviceMotionEvent !== 'undefined') {
    if (typeof DeviceMotionEvent.requestPermission === 'function') {
      // iOS 13+ needs permission
      DeviceMotionEvent.requestPermission().then(state => {
        if (state === 'granted') {
          window.addEventListener('devicemotion', onMotion);
          setStatus('acc', 'active', 'ACCEL: ACTIEF');
        } else {
          setStatus('acc', 'error', 'ACCEL: GEWEIGERD');
          showNotice('⚠️ Verleen toegang tot de bewegingssensor in je browser-instellingen voor de G-kracht meting.');
        }
      }).catch(() => {
        setStatus('acc', 'error', 'ACCEL: FOUT');
      });
    } else {
      window.addEventListener('devicemotion', onMotion);
      accAvailable = true;
    }
  } else {
    setStatus('acc', 'error', 'ACCEL: NIET BESCHIKBAAR');
    showNotice('ℹ️ Deze browser of dit apparaat ondersteunt geen accelerometer. Alleen GPS-snelheid wordt gemeten.');
  }
}

function stopTracking() {
  isRunning = false;
  const btn = document.getElementById('start-btn');
  btn.textContent = '▶ START';
  btn.classList.remove('active');

  if (watchId !== null) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
  }
  window.removeEventListener('devicemotion', onMotion);
  setStatus('gps', '', 'GPS: GESTOPT');
  setStatus('acc', '', 'ACCEL: GESTOPT');
}

function onGPS(pos) {
  const speedMs = pos.coords.speed || 0;
  const speedKmh = Math.round(speedMs * 3.6);
  const accuracy = pos.coords.accuracy ? Math.round(pos.coords.accuracy) : '—';
  const alt = pos.coords.altitude ? Math.round(pos.coords.altitude) : '—';

  document.getElementById('speed-val').textContent = speedKmh;
  document.getElementById('altitude').textContent = alt;
  document.getElementById('accuracy-display').textContent = `±${accuracy} m`;

  updateArc(speedKmh);
  setSpeedColor(speedKmh);

  if (speedKmh > maxSpeed) {
    maxSpeed = speedKmh;
    document.getElementById('max-speed').textContent = maxSpeed;
  }

  setStatus('gps', 'active', 'GPS: ACTIEF');
}

function onGPSError(err) {
  if (err.code === 1) {
    setStatus('gps', 'error', 'GPS: GEWEIGERD');
    showNotice('⚠️ GPS-toegang geweigerd. Sta locatietoegang toe in je browserinstellingen.');
  } else if (err.code === 2) {
    setStatus('gps', 'error', 'GPS: GEEN SIGNAAL');
  } else {
    setStatus('gps', 'warn', 'GPS: TIMEOUT');
  }
}

function onMotion(event) {
  accAvailable = true;
  const acc = event.accelerometerIncludingGravity || event.acceleration;
  if (!acc) return;

  const ax = acc.x || 0;
  const ay = acc.y || 0;
  const az = acc.z || 0;

  // Add to buffers
  accelBuffer.x.push(ax);
  accelBuffer.y.push(ay);
  accelBuffer.z.push(az);
  if (accelBuffer.x.length > SMOOTH) accelBuffer.x.shift();
  if (accelBuffer.y.length > SMOOTH) accelBuffer.y.shift();
  if (accelBuffer.z.length > SMOOTH) accelBuffer.z.shift();

  const sx = avg(accelBuffer.x);
  const sy = avg(accelBuffer.y);
  const sz = avg(accelBuffer.z);

  // Convert to G
  const gx = sx / G;
  const gy = sy / G;
  const gz = sz / G;

  const total = Math.sqrt(sx*sx + sy*sy + sz*sz) / G;

  document.getElementById('gx-val').textContent = gx.toFixed(2);
  document.getElementById('gy-val').textContent = gy.toFixed(2);
  document.getElementById('gz-val').textContent = gz.toFixed(2);
  document.getElementById('g-total').textContent = total.toFixed(2);
  document.getElementById('g-desc').textContent = describeG(total);

  // Bars (max ~3G = 100%)
  const barMax = 3;
  document.getElementById('gx-bar').style.width = Math.min(Math.abs(gx)/barMax*100, 100) + '%';
  document.getElementById('gy-bar').style.width = Math.min(Math.abs(gy)/barMax*100, 100) + '%';
  document.getElementById('gz-bar').style.width = Math.min(Math.abs(gz)/barMax*100, 100) + '%';

  if (total > maxG) {
    maxG = total;
    document.getElementById('max-g').textContent = maxG.toFixed(2);
  }

  setStatus('acc', 'active', 'ACCEL: ACTIEF');
}

function resetStats() {
  maxSpeed = 0;
  maxG = 0;
  document.getElementById('max-speed').textContent = '0';
  document.getElementById('max-g').textContent = '0.00';
  document.getElementById('speed-val').textContent = '0';
  document.getElementById('g-total').textContent = '1.00';
  document.getElementById('gx-val').textContent = '0.00';
  document.getElementById('gy-val').textContent = '0.00';
  document.getElementById('gz-val').textContent = '0.00';
  document.getElementById('g-desc').textContent = 'Rust';
  document.getElementById('altitude').textContent = '—';
  document.getElementById('gx-bar').style.width = '0%';
  document.getElementById('gy-bar').style.width = '0%';
  document.getElementById('gz-bar').style.width = '0%';
  updateArc(0);
  document.getElementById('speed-val').classList.remove('fast', 'vfast');
  hideNotice();
  accelBuffer = { x: [], y: [], z: [] };
}

function setStatus(type, state, text) {
  const dot = document.getElementById(`${type}-dot`);
  const label = document.getElementById(`${type}-status`);
  dot.className = 'dot' + (state ? ' ' + state : '');
  label.textContent = text;
}

function showNotice(msg) {
  const n = document.getElementById('notice');
  n.textContent = msg;
  n.classList.add('show');
}

function hideNotice() {
  document.getElementById('notice').classList.remove('show');
}

// Check initial support
window.addEventListener('load', () => {
  if (!('geolocation' in navigator)) {
    setStatus('gps', 'error', 'GPS: NIET ONDERSTEUND');
  }
  if (typeof DeviceMotionEvent === 'undefined') {
    setStatus('acc', 'error', 'ACCEL: NIET ONDERSTEUND');
  }
});
</script>
</body>
</html>
